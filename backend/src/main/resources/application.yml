server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:mysql://localhost:3306/gongyi_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

app:
  jwt:
    secret: ${JWT_SECRET:please-set-JWT_SECRET-environment-variable}
    expire-seconds: 86400
  init-admin:
    enabled: true
    username: admin
    password: ${ADMIN_PASSWORD:admin123456}
    email: admin@example.com
